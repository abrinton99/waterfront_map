<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Map</title>

  <!-- Leaflet 1.9.4 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.GestureHandling — prevents map from hijacking page scroll on touch -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling/dist/leaflet-gesture-handling.min.css" />
  <script src="https://unpkg.com/leaflet-gesture-handling/dist/leaflet-gesture-handling.min.js"></script>

  <!-- Leaflet.markercluster — groups nearby pins when zoomed out -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Leaflet.Rotate — enables map rotation / custom bearing -->
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

  <style>
    /* ── Reset & layout ─────────────────────────────────────────────────── */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Map fills the full viewport; the iframe parent controls external sizing */
    #map {
      width: 100vw;
      height: 100vh;
    }

    /* ── Error overlay ──────────────────────────────────────────────────── */
    #error-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.92);
      align-items: center;
      justify-content: center;
    }
    #error-overlay.visible { display: flex; }
    #error-overlay p {
      font-size: 16px;
      color: #374151;
      padding: 24px;
      text-align: center;
    }

    /* ── Custom pin marker ──────────────────────────────────────────────── */
    .photo-pin {
      width: 36px;
      height: 36px;
      background: #2563eb;
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    }

    /* ── Popup content ──────────────────────────────────────────────────── */
    .popup-img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    /* Grey placeholder shown when image fails to load */
    .popup-img-placeholder {
      display: block;
      width: 100%;
      height: 120px;
      background: #d1d5db;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .popup-description {
      font-size: 14px;
      color: #1f2937;
      line-height: 1.4;
      margin: 0 0 8px;
    }

    .popup-link {
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }
    .popup-link:hover { text-decoration: underline; }

    /* ── Legend control ─────────────────────────────────────────────────── */
    .map-legend {
      font-size: 14px;
      color: #1f2937;
      padding: 10px 12px;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      line-height: 1.4;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-row + .legend-row { margin-top: 6px; }
    .legend-swatch {
      width: 22px;
      height: 14px;
      flex: none;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="error-overlay" role="alert">
    <p>Could not load photo data.</p>
  </div>

  <script>
    // ── BEARING ──────────────────────────────────────────────────────────────
    // Default map rotation in degrees, clockwise from north.
    // 0 = north up, 90 = east up, 180 = south up, 270 = west up.
    // Adjust until the map aligns with your waterfront orientation.
    const BEARING = -47;
    // ────────────────────────────────────────────────────────────────────────

    // ── POLYGON / ZONING ─────────────────────────────────────────────────────
    // Polygons are loaded at runtime from zoning_W_I.geojson — produced by
    // get_zoning.py from the City of Sausalito zoning layer. Each feature has
    // a `Zoning` property ("W" = Waterfront, "I" = Industrial); styling below
    // colors them per code. The combined extent determines fitBounds.
    // ────────────────────────────────────────────────────────────────────────
    const ZONING_FILE = "zoning_W_I.geojson";
    const ZONING_STYLE = {
      W: { color: "#0ea5e9", weight: 2, fillColor: "#0ea5e9", fillOpacity: 0.25 },
      I: { color: "#7c3aed", weight: 2, fillColor: "#7c3aed", fillOpacity: 0.25 }
    };
    const ZONING_DEFAULT_STYLE = { color: "#6b7280", weight: 2, fillOpacity: 0.2 };

    // ── MAP INIT ─────────────────────────────────────────────────────────────
    const INITIAL_ZOOM = 15;
    const map = L.map("map", {
      // Provisional center — overridden once zoning (or photo) data loads.
      // Zoom is held fixed at INITIAL_ZOOM; only the center is recomputed.
      center: [0, 0],
      zoom: INITIAL_ZOOM,
      rotate: true,                   // Leaflet.Rotate plugin
      bearing: BEARING,
      rotateControl: { closeOnZeroBearing: false },
      gestureHandling: true,          // Leaflet.GestureHandling plugin
      gestureHandlingOptions: {
        text: {
          touch: "Use two fingers to move the map",
          scroll: "Use Ctrl + scroll to zoom the map",
          scrollMac: "Use ⌘ + scroll to zoom the map"
        }
      }
    });

    // OpenStreetMap tile layer
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> contributors",
      maxZoom: 19
    }).addTo(map);

    // ── POLYGON LAYER ─────────────────────────────────────────────────────────
    let polygonBounds = null;
    const polygonReady = fetch(ZONING_FILE)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(geojson => {
        const polygonLayer = L.geoJSON(geojson, {
          style: feature => {
            const z = feature.properties && feature.properties.Zoning;
            return ZONING_STYLE[z] || ZONING_DEFAULT_STYLE;
          }
        }).addTo(map);
        polygonBounds = polygonLayer.getBounds();
        map.setView(polygonBounds.getCenter(), INITIAL_ZOOM);
      })
      .catch(err => {
        console.warn(`Could not load ${ZONING_FILE}:`, err);
        // Fall back to fitting on photo coords after load
      });

    // ── LEGEND CONTROL ───────────────────────────────────────────────────────
    // Built from ZONING_STYLE so swatch color, border weight, and fill opacity
    // stay in sync with the polygons. Each swatch mirrors a polygon: fill at
    // fillOpacity, stroke at full opacity.
    const ZONING_LABELS = { W: "Waterfront Zone", I: "Industrial Zone" };

    function hexToRgba(hex, alpha) {
      const n = parseInt(hex.slice(1), 16);
      return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
    }

    const legend = L.control({ position: "bottomleft" });
    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "map-legend");
      div.innerHTML = Object.keys(ZONING_LABELS).map(code => {
        const s = ZONING_STYLE[code];
        return `
          <div class="legend-row">
            <span class="legend-swatch" style="
              background:${hexToRgba(s.fillColor, s.fillOpacity)};
              border:${s.weight}px solid ${s.color};"></span>
            <span>${ZONING_LABELS[code]}</span>
          </div>`;
      }).join("");
      return div;
    };
    legend.addTo(map);

    // ── MARKER CLUSTER ───────────────────────────────────────────────────────
    // maxClusterRadius: pins within 50px of each other group together
    const clusterGroup = L.markerClusterGroup({ maxClusterRadius: 50 });
    map.addLayer(clusterGroup);

    // ── CUSTOM PIN ICON FACTORY ───────────────────────────────────────────────
    // Visual: 36×36px teardrop. Hit area padded to 44×44px per WCAG/Apple HIG.
    function makePinIcon(description) {
      return L.divIcon({
        className: "",           // suppress default Leaflet icon wrapper styles
        html: `<div class="photo-pin" title="${escapeAttr(description)}" aria-label="${escapeAttr(description)}"></div>`,
        iconSize: [44, 44],      // 44×44 tap target
        iconAnchor: [22, 40],    // anchor at visual bottom-centre of the teardrop
        popupAnchor: [0, -40]
      });
    }

    // ── POPUP HTML BUILDER ────────────────────────────────────────────────────
    function buildPopupHTML(photo) {
      const desc = escapeHTML(photo.description);
      const alt  = escapeAttr(photo.description);
      return `
        <img
          class="popup-img"
          src="${escapeAttr(photo.thumbnail_url)}"
          alt="${alt}"
          onerror="this.outerHTML='<div class=\\'popup-img-placeholder\\'></div>'"
        />
        <p class="popup-description">${desc}</p>
        <a class="popup-link" href="${escapeAttr(photo.full_url)}" target="_blank" rel="noopener">
          View full size
        </a>
      `;
    }

    // ── LOAD PHOTOS ───────────────────────────────────────────────────────────
    // photos.json must live in the same directory as index.html
    fetch("photos.json")
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(photos => {
        if (!Array.isArray(photos) || photos.length === 0) return;

        photos.forEach(photo => {
          const marker = L.marker([photo.lat, photo.lng], {
            icon: makePinIcon(photo.description)
          });

          marker.bindPopup(buildPopupHTML(photo), {
            maxWidth: 300,
            minWidth: 200
          });

          clusterGroup.addLayer(marker);
        });

        // If polygon bounds weren't available, center on photo coords instead
        polygonReady.finally(() => {
          if (!polygonBounds) {
            map.setView(clusterGroup.getBounds().getCenter(), INITIAL_ZOOM);
          }
        });
      })
      .catch(err => {
        console.error("Failed to load photos.json:", err);
        document.getElementById("error-overlay").classList.add("visible");
      });

    // ── iOS SAFARI / IFRAME FIX ───────────────────────────────────────────────
    // Prevents tile misalignment inside iframes on iOS Safari.
    setTimeout(() => map.invalidateSize(), 200);
    window.addEventListener("resize", () => map.invalidateSize());
    window.addEventListener("orientationchange", () => map.invalidateSize());

    // ── UTILITIES ─────────────────────────────────────────────────────────────
    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeAttr(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
